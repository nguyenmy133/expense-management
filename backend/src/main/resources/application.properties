# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=expense-management-api

# ===================================
# MYSQL DATABASE CONFIGURATION
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/expense_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE CONFIGURATION
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ===================================
# JWT CONFIGURATION (Custom Auth)
# ===================================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=86400000
openai.api-key=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
openai.model=gpt-4-turbo-preview
openai.max-tokens=1000
openai.temperature=0.7

# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=8080
server.servlet.context-path=/api

# ===================================
# CORS CONFIGURATION
# ===================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true

# ===================================
# LOGGING CONFIGURATION
# ===================================
logging.level.com.expense.management=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
